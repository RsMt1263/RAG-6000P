<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>R&G SRG-6000P - Dynamické spoje</title>
    <script src="cp.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            color: #ffffff;
            overflow: hidden;
        }

        .computer-frame {
            width: 1000px;
            height: 667px;
            background-image: url('6000_spoj.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            position: relative;
            flex-shrink: 0;
        }

        #clock { position: absolute; top: 80px; right: 240px; font-size: 40px; color: #ffffff; }
        #direction { position: absolute; top: 136px; left: 175px; width: 820px; font-size: 35px; color: #ffffff; text-align: left; white-space: nowrap; overflow: hidden; }
        .line-info { position: absolute; top: 189px; left: 244px; font-size: 22px; color: #ffffff; }
        .vehicle-info { position: absolute; top: 189.5px; right: 380px; font-size: 20px; color: #ffffff; }
        .stop-count { position: absolute; top: 213px; left: 280px; font-size: 20px; color: #ffffff; }
        
        /* --- OPRAVENÉ VIZUÁLNE HRANICE --- */
        .route-window {
            position: absolute;
            top: 298px;
            left: 175px;
            width: 615px; /* Upravené aby nešlo do sivej */
            height: 40px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        #route-slider {
            position: absolute;
            display: flex;
            align-items: center;
            transition: left 0.4s ease-in-out;
            height: 100%;
            left: 25px; /* Odstup aby prvá gulička nebola polovičná */
        }

        #actual-line {
            position: absolute;
            height: 10px;
            background-color: #217a87;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
            border-radius: 5px;
        }

        .stop-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: #0a4a52;
            border-radius: 50%;
            border: 2px solid #000;
            z-index: 2;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        #marker {
            position: absolute;
            top: 267px;
            left: 200px; /* Zarovnané na stred prvej guličky (175 + 25) */
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 22px solid #ffffff;
            transition: left 0.4s ease-in-out;
            z-index: 20;
            transform: translateX(-50%); /* Presné vycentrovanie špičky */
        }

        .current-stop-container { position: absolute; top: 343px; left: 75px; width: 785px; text-align: center; }
        #stop-name { font-size: 24px; margin: 0; color: #ffffff; }
        #street-name { font-size: 24px; color: #ffffff; margin: 0; opacity: 0.9; }

        .prev-stops { position: absolute; top: 404px; left: 135px; width: 275px; text-align: center; font-size: 18px; color: #ffffff; }
        .next-stops { position: absolute; top: 404.5px; right: 195px; width: 275px; text-align: center; font-size: 18px; color: #ffffff; }
        .stop-item { height: 32px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #delay {
            position: absolute;
            top: 412px;
            left: 330px;
            width: 280px;
            font-size: 45px;
            text-align: center;
            color: #ffffff;
        }

        .btn-overlay { position: absolute; cursor: pointer; z-index: 10; }
        #tlacidlo-vypnut { position: absolute; right: 55px; top: 55px; width: 75px; height: 65px; z-index: 1001; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="computer-frame" id="mainFrame">
        <div id="tlacidlo-vypnut" onclick="checkTripleClick()"></div>

        <div id="clock">00:00:00</div>
        <div id="direction">---</div>
        <div class="line-info">-</div>
        <div class="vehicle-info">---</div>
        <div class="stop-count"><span id="curr-idx">0</span>/<span id="total-idx">0</span></div>
        <div id="marker"></div>

        <div class="route-window">
            <div id="route-slider">
                <div id="actual-line"></div>
            </div>
        </div>
        
        <div class="current-stop-container">
            <p id="stop-name">NAČÍTAVAM...</p>
            <p id="street-name">---</p>
        </div>
        
        <div class="prev-stops">
            <div class="stop-item" id="p2">-</div>
            <div class="stop-item" id="p1">-</div>
        </div>
        
        <div id="delay">+00:00</div>
        
        <div class="next-stops">
            <div class="stop-item" id="n1">-</div>
            <div class="stop-item" id="n2">-</div>
        </div>

        <div class="btn-overlay" style="top: 155px; left: 95px; width: 65px; height: 65px;" onclick="nasledujuciSpoj()"></div>
        <div class="btn-overlay" style="top: 495px; left: 340px; width: 70px; height: 65px;" onclick="move(-1)"></div>
        <div class="btn-overlay" style="top: 495px; left: 565px; width: 40px; height: 65px;" onclick="move(1)"></div>
        <div class="btn-overlay" style="top: 495px; left: 630px; width: 155px; height: 70px;" onclick="logout()"></div>
    </div>

    <audio id="click-sound" src="6000_beep.wav" preload="auto"></audio>

<script>
    let cestovnyPoriadok = []; 
    let indexSpoja = 0; 
    let currentIndex = 0;
    let aktivnySpoj, zastavky, startTime;
    const snd = document.getElementById('click-sound');

    // Opravené konštanty pre výpočet
    const viewportWidth = 615;
    const sliderPadding = 25; 
    let dotSpacing = 160;

    window.onbeforeunload = function() { return "Zmeny nebudú uložené."; };
    window.addEventListener('keydown', function(e) {
        if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) e.preventDefault();
    });

    function autoScale() {
        const frame = document.getElementById('mainFrame');
        const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 667);
        frame.style.transform = `scale(${scale})`;
        frame.style.transformOrigin = 'center center';
    }

    window.addEventListener('resize', autoScale);
    window.addEventListener('load', autoScale);

    function pipni() {
        if (snd) { 
            snd.currentTime = 0; 
            snd.play().catch(() => {}); 
        }
    }

    let clickCount = 0;
    let clickTimer;
    function checkTripleClick() {
        pipni();
        clickCount++;
        if (clickCount === 1) { clickTimer = setTimeout(() => { clickCount = 0; }, 1500); }
        if (clickCount === 3) { 
            window.onbeforeunload = null;
            localStorage.clear();
            window.location.href = "index.html"; 
        }
    }

    function prihlasenie() {
        const sekundarnyLog = localStorage.getItem('srg_sekundarny_log') || "";
        
        if (sekundarnyLog === "10") {
            localStorage.setItem('srg_sekundarny_log', '0');
            window.onbeforeunload = null;
            window.location.href = "r.spoja.html";
            return;
        }

        const srgLog = localStorage.getItem('srg_log') || "";
        const ulozenaJazda = localStorage.getItem('aktivna_jazda');

        if (ulozenaJazda) {
            const data = JSON.parse(ulozenaJazda);
            aktivnySpoj = data.spoj;
            currentIndex = data.startIndex || 0;
            zastavky = aktivnySpoj.t;
            
            const casti = srgLog.split('.');
            const kurzKey = casti[1];
            if (kurzKey && typeof databazaCP !== 'undefined' && databazaCP[kurzKey]) {
                document.querySelector('.vehicle-info').innerText = databazaCP[kurzKey].vozidlo || "803";
            }

            initRoute();
            updateDisplay();
        } 
        else if (srgLog.startsWith('7.')) {
            const casti = srgLog.split('.');
            const kurzKey = casti[1]; 
            const denKey = casti[2];  

            if (typeof databazaCP !== 'undefined' && databazaCP[kurzKey] && databazaCP[kurzKey][denKey]) {
                cestovnyPoriadok = databazaCP[kurzKey][denKey];
                document.querySelector('.vehicle-info').innerText = databazaCP[kurzKey].vozidlo || "803";
                nacitajDataSpoja();
            }
        }
        autoScale();
    }

    function nacitajDataSpoja() {
        if (cestovnyPoriadok.length === 0) return;
        aktivnySpoj = cestovnyPoriadok[indexSpoja];
        zastavky = aktivnySpoj.t; 
        currentIndex = 0;
        initRoute();
        updateDisplay();
    }

    function initRoute() {
        const slider = document.getElementById('route-slider');
        slider.innerHTML = '<div id="actual-line"></div>';
        const line = document.getElementById('actual-line');
        
        // Dynamické prispôsobenie medzier pri malom počte zastávok
        const availableWidth = viewportWidth - (sliderPadding * 2);
        if (zastavky.length > 1 && (zastavky.length - 1) * 160 < availableWidth) {
            dotSpacing = availableWidth / (zastavky.length - 1);
        } else {
            dotSpacing = 160;
        }

        zastavky.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'stop-dot';
            dot.style.left = (i * dotSpacing) + "px";
            slider.appendChild(dot);
        });
        
        line.style.width = ((zastavky.length - 1) * dotSpacing) + "px";
        line.style.left = "0px";
    }

    function updateDisplay() {
        if (!zastavky || zastavky.length === 0) return;
        const current = zastavky[currentIndex];
        const slider = document.getElementById('route-slider');
        const marker = document.getElementById('marker');
        
        document.getElementById('direction').innerText = aktivnySpoj.smer;
        document.getElementById('stop-name').innerText = current.n;
        document.getElementById('street-name').innerText = current.u || "";
        document.querySelector('.line-info').innerText = aktivnySpoj.L;
        document.getElementById('curr-idx').innerText = currentIndex;
        document.getElementById('total-idx').innerText = zastavky.length - 1;
        
        let stopX = currentIndex * dotSpacing;
        let totalRouteWidth = (zastavky.length - 1) * dotSpacing;
        
        let sliderL = sliderPadding;
        let markerL = 175 + sliderPadding + stopX;

        // Logika posuvu čiary
        if (totalRouteWidth > (viewportWidth - sliderPadding * 2)) {
            sliderL = (viewportWidth / 2) - stopX;
            
            if (sliderL > sliderPadding) {
                sliderL = sliderPadding;
                markerL = 175 + sliderL + stopX;
            } else if (sliderL < (viewportWidth - totalRouteWidth - sliderPadding)) {
                sliderL = viewportWidth - totalRouteWidth - sliderPadding;
                markerL = 175 + sliderL + stopX;
            } else {
                markerL = 175 + (viewportWidth / 2);
            }
        }

        slider.style.left = sliderL + "px";
        marker.style.left = markerL + "px";

        document.getElementById('p1').innerText = currentIndex > 0 ? zastavky[currentIndex - 1].n : "-------";
        document.getElementById('p2').innerText = currentIndex > 1 ? zastavky[currentIndex - 2].n : "-------";
        document.getElementById('n1').innerText = currentIndex < zastavky.length - 1 ? zastavky[currentIndex + 1].n : "-------";
        document.getElementById('n2').innerText = currentIndex < zastavky.length - 2 ? zastavky[currentIndex + 2].n : "-------";
        
        const [h, m] = aktivnySpoj.odchod.split(':');
        startTime = new Date();
        startTime.setHours(parseInt(h), parseInt(m), 0, 0);

        updateDelay();
    }

    function nasledujuciSpoj() {
        pipni();
        window.onbeforeunload = null;
        setTimeout(() => { window.location.href = "spoj.volba_4.html"; }, 200);
    }
        
    function move(dir) {
        pipni();
        let novyIndex = currentIndex + dir;
        if (novyIndex >= 0 && novyIndex < zastavky.length) {
            currentIndex = novyIndex;
            updateDisplay();
        }
    }

    function updateDelay() {
        if (!startTime || !zastavky) return;
        const now = new Date();
        const plannedTime = new Date(startTime.getTime() + (zastavky[currentIndex].min || 0) * 60000);
        
        let diffMs = plannedTime - now;
        let diffSec = Math.floor(diffMs / 1000);

        if (currentIndex === 0 && diffSec === 0) {
            window.onbeforeunload = null;
            window.location.href = "r.spoja.html";
            return;
        }

        let absDiff = Math.abs(diffMs);
        let m = Math.floor(absDiff / 60000);
        let s = Math.floor((absDiff % 60000) / 1000);
        
        const delayEl = document.getElementById('delay');
        let sign = diffMs < 0 ? "-" : "+";
        delayEl.innerText = sign + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
        
        if (diffMs > 0) {
            delayEl.style.color = (now.getSeconds() % 2 === 0) ? "#ffffff" : "#ff0000";
        } else {
            delayEl.style.color = "#ffffff";
        }
    }

    function logout() {
        pipni();
        window.onbeforeunload = null;
        localStorage.setItem('srg_log', '3');
        setTimeout(() => { window.location.href = "menu_poprihlas.html"; }, 200);
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('sk-SK');
        updateDelay();
    }, 1000);

    window.onload = prihlasenie;
</script>
</body>
</html>
