<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SRG-6000P Simulátor - Menu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            font-weight: bold;
            color: white;
            touch-action: manipulation;
        }

        .monitor-container {
            position: relative;
            width: 1000px; 
            height: 650px; 
            background: url('6000_boot0_1.png') no-repeat center center;
            background-size: contain;
            flex-shrink: 0;
        }

        .menu-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('6000_menu_start.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            z-index: 5;
            transition: background 0.3s;
        }

        /* TLAČIDLO VYPNUTIA (Trojklik - vľavo hore) */
        #tlacidlo-vypnut {
            position: absolute;
            right: 60px;   
            top: 60px;
            width: 65px;  
            height: 55px; 
            cursor: pointer;
            z-index: 999;
            background: rgba(255, 255, 255, 0); /* Jemný nádych, aby nezavadzalo */
        }

        /* TLAČIDLO PRIHLÁSENIA (To okrúhle, čo nastavujeme teraz) */
        #tlacidlo-prihlasit {
            position: absolute;
            /* UPRAVUJ TIETO HODNOTY: */
            right: 61px;   
            top: 207px;
            width: 60px;   
            height: 55px; 
            cursor: pointer;
            z-index: 999;
            background: rgba(255, 255, 255, 0); /* Jemný nádych, aby nezavadzalo */
        }


        /* --- Zvyšok štýlov (hodiny, údaje) zostáva rovnaký --- */
        .cas-box { position: absolute; left: 195px; top: 175px; z-index: 10; pointer-events: none; }
        .cas { font-size: 85px; margin: 0; letter-spacing: 2px; }
        .ostatne-udaje { position: absolute; left: 210px; top: 275px; text-align: left; z-index: 10; pointer-events: none; }
        .den { font-size: 48px; margin: 0; }
        .datum { font-size: 48px; margin: 5px 0; }
        .vozidlo { font-size: 32px; margin-top: 15px; }
        .status-box { position: absolute; right: 255px; top: 310px; border: 3px solid #555; padding: 8px 15px; color: #ff7b00; font-size: 32px; border-radius: 5px; background: rgba(0,0,0,0.7); z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div id="tlacidlo-prihlasit" onclick="prihlasit()"></div>
    
    <div class="monitor-container" id="mainFrame">
        <div class="menu-layer" id="layerMenu"></div>
        
        <div id="tlacidlo-vypnut" onclick="checkTripleClick()"></div>
        <div id="tlacidlo-prihlasit" onclick="prihlasit()"></div>

        <div class="cas-box">
            <div id="hodiny" class="cas">00:00:00</div>
        </div>

        <div class="ostatne-udaje">
            <div id="den_v_tyzdni" class="den">...</div>
            <div id="datum_dnes" class="datum">0000-00-00</div>
            <div class="vozidlo">Č. vozidla: </div>
        </div>

        <div class="status-box">IP[09]:1</div>
    </div>

    <script>
    if (localStorage.getItem('srg_log') !== '1') {
        localStorage.clear();
        window.location.href = "index.html";
    }

        function prihlasit() {
            localStorage.setItem('srg_log', '2'); // Posúvame na level 2
            window.location.href = "prihlas.html";
        }

        function zvacsiPanel() {
            const frame = document.getElementById('mainFrame');
            const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 650);
            frame.style.transform = `scale(${scale})`;
            frame.style.transformOrigin = 'center center';
        }

        window.onload = () => { zvacsiPanel(); aktualizujCas(); };
        window.onresize = zvacsiPanel;

        let clickCount = 0;
        let clickTimer;
        function checkTripleClick() {
            clickCount++;
            if (clickCount === 1) { clickTimer = setTimeout(() => { clickCount = 0; }, 1500); }
            if (clickCount === 3) { window.location.href = "index.html"; }
        }

        function aktualizujCas() {
            const teraz = new Date();
            const dni = ['Nedeľa', 'Pondelok', 'Utorok', 'Streda', 'Štvrtok', 'Piatok', 'Sobota'];
            const h = String(teraz.getHours()).padStart(2, '0');
            const m = String(teraz.getMinutes()).padStart(2, '0');
            const s = String(teraz.getSeconds()).padStart(2, '0');
            document.getElementById('hodiny').textContent = h + ":" + m + ":" + s;
            document.getElementById('den_v_tyzdni').textContent = dni[teraz.getDay()];
            const rok = teraz.getFullYear();
            const mesiac = String(teraz.getMonth() + 1).padStart(2, '0');
            const den = String(teraz.getDate()).padStart(2, '0');
            document.getElementById('datum_dnes').textContent = rok + "-" + mesiac + "-" + den;
        }
        setInterval(aktualizujCas, 1000);
    </script>
</body>
</html>
