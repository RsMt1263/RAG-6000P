<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SRG-6000P - Prihlásenie</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: Arial, sans-serif; font-weight: bold; color: white; touch-action: manipulation; }
        .monitor-container { position: relative; width: 1000px; height: 650px; background: url('6000_prihlas_okno.png') no-repeat center center; background-size: contain; flex-shrink: 0; }
        
        .btn-touch { position: absolute; z-index: 100; cursor: pointer; background: rgba(0,0,0,0); }
        #tlacidlo-spat { left: 105px; top: 74px; width: 60px; height: 60px; }
        #tlacidlo-vypnut { right: 60px; top: 55px; width: 65px; height: 60px; }
        #tlacidlo-potvrdit { right: 239px; top: 305px; width: 210px; height: 70px; }

        .input-box { position: absolute; left: 115px; width: 268px; height: 60px; z-index: 100; display: flex; align-items: center; }
        #box-cislo { top: 230px; }
        #box-heslo { top: 369px; }
        input { background: transparent; border: none; color: white; outline: none; width: 100%; text-align: center; font-size: 40px; font-weight: bold; }

        #hodiny-prihlas { position: absolute; right: 250px; top: 190px; font-size: 70px; z-index: 100; }
        #vypis-meno { position: absolute; left: 50%; bottom: 75px; transform: translateX(-50%); width: 80%; text-align: center; font-size: 25px; z-index: 110; color: white; letter-spacing: 1px; }
    </style>
</head>
<body>

    <audio id="beepSound" src="6000_beep.wav" preload="auto"></audio>
    <audio id="beepSoundSuccess" src="6000_beep2.wav" preload="auto"></audio>

    <div class="monitor-container" id="mainFrame">
        <div id="tlacidlo-spat" class="btn-touch" onclick="handleBack()"></div>
        <div id="tlacidlo-vypnut" class="btn-touch" onclick="handleExit()"></div>
        <div id="tlacidlo-potvrdit" class="btn-touch" onclick="spustitOverenie()"></div>

        <div id="hodiny-prihlas">00:00:00</div>

        <div id="box-cislo" class="input-box">
            <input type="text" id="driver-id" autocomplete="off" onfocus="playBeep()">
        </div>
        <div id="box-heslo" class="input-box">
            <input type="text" id="driver-pin" oninput="maskovanieHesla(this)" onfocus="playBeep()" autocomplete="off">
        </div>

        <div id="vypis-meno"></div>
    </div>

    <script src="login.js"></script>
    <script>
        const snd = document.getElementById('beepSound');
        const sndSuccess = document.getElementById('beepSoundSuccess');
        const frame = document.getElementById('mainFrame');

        if (localStorage.getItem('srg_log') !== '2') {
            localStorage.clear();
            window.location.href = "index.html"; 
        } else {
            localStorage.removeItem('srg_log');
        }

        function playBeep() {
            if (snd) { snd.currentTime = 0; snd.play().catch(e => {}); }
        }

        function playSuccessBeep() {
            if (sndSuccess) { sndSuccess.currentTime = 0; sndSuccess.play().catch(e => {}); }
        }

        function handleBack() {
            playBeep(); // Prehrá zvuk
            
            // Nastavíme stav pre menu.html
            localStorage.setItem('srg_log', '1'); 

            // Počká 1000 milisekúnd (1 sekundu) a potom presmeruje
            setTimeout(() => {
                window.location.href = 'menu.html';
            }, 1000);
        }

        let clicks = 0;
        function handleExit() {
            playBeep();
            clicks++;
            if (clicks === 3) {
                localStorage.clear();
                window.location.href = "index.html";
            }
            setTimeout(() => { clicks = 0; }, 3000);    
        }

        function aktualizujHodiny() {
            const teraz = new Date();
            document.getElementById('hodiny-prihlas').textContent = 
                teraz.getHours().toString().padStart(2, '0') + ":" + 
                teraz.getMinutes().toString().padStart(2, '0') + ":" + 
                teraz.getSeconds().toString().padStart(2, '0');
        }

        function zvacsi() {
            const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 650);
            frame.style.transform = `scale(${scale})`;
            frame.style.transformOrigin = 'center center';
        }

        window.onload = () => { zvacsi(); aktualizujHodiny(); setInterval(aktualizujHodiny, 1000); };
        window.onresize = zvacsi;
    </script>
</body>
</html>
