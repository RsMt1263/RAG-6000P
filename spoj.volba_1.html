<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SRG-6000P - Výber turnusu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            font-weight: 400;
            color: white;
            touch-action: manipulation;
        }

        .monitor-container {
            position: relative;
            width: 1000px; 
            height: 650px; 
            background: url('6000_zmena1.png') no-repeat center center;
            background-size: contain;
            flex-shrink: 0;
        }

        .zoznam-spojov {
            position: absolute;
            left: 182px;   
            top: 137px;    
            width: 296px;  
            height: 433px; 
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 20;
            padding: 0;
        }

        .spoj-polozka {
            padding: 4px 5px; 
            font-size: 26px; 
            font-weight: normal;
            color: #ccc; 
            cursor: pointer;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border: none;
            line-height: 1.0;
        }

        .selected {
            background-image: url('6000_zmena.select.png') !important;
            color: #fff !important; 
        }

        #displej-kod {
            position: absolute;
            left: 566px;   
            top: 192px;    
            width: 200px;
            height: 55px;
            background: transparent; 
            border: none;
            color: #ccc;
            font-size: 37px;
            font-family: Arial, sans-serif;
            text-align: right;
            z-index: 30;
            pointer-events: none;
        }

        #tlacidlo-potvrd {
            position: absolute;
            left: 550px;   
            top: 342px;    
            width: 209px;
            height: 72px;
            cursor: pointer;
            z-index: 1000;
            background: transparent; 
        }

        .cas-kontajner {
            position: absolute;
            left: 575px;
            top: 500px;
            width: 209px;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        #hodiny-prihlas {
            font-size: 40px;
            color: #ffffff;
            font-weight: bold;
        }

        #tlacidlo-spat {
            position: absolute;
            left: 88px;
            top: 108px;
            width: 65px;
            height: 65px;
            cursor: pointer;
            z-index: 1000;
        }

        .zoznam-spojov::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="monitor-container" id="mainFrame">
        <div id="tlacidlo-spat" onclick="istSpat()"></div>
        <input type="text" id="displej-kod" readonly value="">
        <div id="tlacidlo-potvrd" onclick="potvrdit()"></div>

        <div class="cas-kontajner">
            <div id="hodiny-prihlas">00:00:00</div>
        </div>

        <div class="zoznam-spojov" id="zoznam">
            <div class="spoj-polozka" onclick="vyberSpoj(this, '11')">11</div>
            <div class="spoj-polozka" onclick="vyberSpoj(this, '21')">21</div>
            <div class="spoj-polozka" onclick="vyberSpoj(this, '900')">900</div>
        </div>
    </div>

    <script>
    if (localStorage.getItem('srg_log') !== '4') {
        localStorage.clear();
        window.location.href = "index.html";
    }

    function vyberSpoj(element, cislo) {
        const polozky = document.querySelectorAll('.spoj-polozka');
        polozky.forEach(p => p.classList.remove('selected'));
        element.classList.add('selected');
        
        document.getElementById('displej-kod').value = cislo;
        localStorage.setItem('vybrany_spoj', cislo);
    }

    function potvrdit() {
        const vybrane = localStorage.getItem('vybrany_spoj');
        // Kontrola: Ak nie je vybraté nič, nepustí ťa ďalej
        if (vybrane && vybrane !== "") {
            localStorage.setItem('srg_log', '5.' + vybrane);
            window.location.href = "spoj.volba_2.html";
        } else {
            alert("Zvoľ kód linky!");
        }
    }

    function aktualizujHodiny() {
        const teraz = new Date();
        const h = String(teraz.getHours()).padStart(2, '0');
        const m = String(teraz.getMinutes()).padStart(2, '0');
        const s = String(teraz.getSeconds()).padStart(2, '0');
        const el = document.getElementById('hodiny-prihlas');
        if (el) el.textContent = h + ":" + m + ":" + s;
    }
    setInterval(aktualizujHodiny, 1000);

    function istSpat() {
        localStorage.setItem('srg_log', '3');
        window.location.href = "menu.html";
    }

    function zvacsiPanel() {
        const frame = document.getElementById('mainFrame');
        const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 650);
        frame.style.transform = `scale(${scale})`;
        frame.style.transformOrigin = 'center center';
    }

    window.onload = () => {
        // Pri načítaní vymažeme predošlý výber, aby musel vodič kliknúť znova
        localStorage.removeItem('vybrany_spoj');
        document.getElementById('displej-kod').value = "";
        
        zvacsiPanel();
        aktualizujHodiny();
    };
    window.onresize = zvacsiPanel;
    </script>
</body>
</html>
