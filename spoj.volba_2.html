<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SRG-6000P - Výber poradia</title>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #000; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; font-family: Arial, sans-serif; 
            font-weight: 400; color: white; touch-action: manipulation; 
        }
        
        .monitor-container { 
            position: relative; 
            width: 1000px; height: 650px; 
            background: url('6000_zmena2.png') no-repeat center center; 
            background-size: contain; flex-shrink: 0; 
        }

        /* ZOZNAM PORADÍ */
        .zoznam-spojov {
            position: absolute;
            left: 182px; top: 137px; width: 296px; height: 433px; 
            overflow-y: hidden; 
            display: flex; flex-direction: column;
            z-index: 20; padding: 0;
        }

        .spoj-polozka {
            padding: 8px 10px; 
            font-size: 26px; 
            color: #ccc; 
            cursor: pointer; 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            border: none; 
            line-height: 1.0; 
        }

        /* VÝBER - TYRKYSOVÝ PÁS */
        .selected {
            background-color: #5ec6ca !important; 
            color: #000 !important; 
        }

        /* KLIKACIE ZÓNY (NEVIDITEĽNÉ) */
        .btn-nav { 
            position: absolute; width: 65px; cursor: pointer; z-index: 1000; 
            background: transparent; 
        }
        
        #btn-spat-hard  { left: 101px; top: 70px; height: 62px; } 
        #btn-vpred { left: 101px; top: 140px; height: 62px; } 
        #btn-vzad  { left: 101px; top: 209px; height: 62px; } 

        #tlacidlo-vypnut { position: absolute; right: 55px; top: 55px; width: 75px; height: 65px; z-index: 1001; cursor: pointer; }
        #tlacidlo-potvrd { position: absolute; left: 550px; top: 288px; width: 209px; height: 72px; z-index: 1000; cursor: pointer; }

        /* TYRKYSOVÉ TLAČIDLO SPÄŤ (TEXTOVÉ) */
        #tlacidlo-spat-textove {
            position: absolute;
            left: 552px; top: 375px; width: 210px; height: 72px;
            background-color: #1a94ab; 
            color: white;
            font-size: 40px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            cursor: pointer;
            z-index: 1001;
            text-decoration: none;
        }

        #tlacidlo-spat-textove:active { background-color: #147a8d; }

        /* DISPLEJ A HODINY */
        #displej-kod { 
            position: absolute; left: 566px; top: 192px; width: 200px; height: 55px; 
            background: transparent; border: none; color: #ccc; 
            font-size: 37px; text-align: right; pointer-events: none; 
        }
        
        .cas-kontajner { position: absolute; left: 575px; top: 500px; width: 209px; text-align: center; }
        #hodiny { font-size: 40px; color: #ffffff; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="beepSound" src="6000_beep.wav" preload="auto"></audio>

    <div class="monitor-container" id="mainFrame">
        <!-- Vypnutie -->
        <div id="tlacidlo-vypnut" onclick="checkTripleClick()"></div>
        
        <!-- Navigácia -->
        <div id="btn-spat-hard" class="btn-nav" onclick="istSpat()"></div>
        <div id="btn-vpred" class="btn-nav" onclick="navigujZoznam(1)"></div>
        <div id="btn-vzad" class="btn-nav" onclick="navigujZoznam(-1)"></div>
        
        <!-- Potvrdenie a Späť (textové) -->
        <div id="tlacidlo-potvrd" onclick="potvrdit()"></div>
        <div id="tlacidlo-spat-textove" onclick="istSpat()">Späť</div>

        <input type="text" id="displej-kod" readonly value="">

        <div class="cas-kontajner">
            <div id="hodiny">00:00:00</div>
        </div>

        <div class="zoznam-spojov" id="zoznam-dynamicky"></div>
    </div>

    <script>
        // --- 1. STRIKTNÁ KONTROLA STAVU ---
        const srgLog = localStorage.getItem('srg_log') || "";
        if (!srgLog.startsWith('5')) {
            localStorage.clear();
            window.location.href = "index.html";
        }

        const snd = document.getElementById('beepSound');
        let aktualnyIndex = -1;

        // Ochrana proti refreshu
        window.onbeforeunload = function() { return "Zmeny nebudú uložené."; };
        window.addEventListener('keydown', function(e) {
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) e.preventDefault();
        });

        // Dáta poradí
        const dataPoradia = {
            "5.11": ["41", "42", "43", "44","45"],
            "5.21": ["41"],
            "5.900": ["01"]
        };

        function playBeep() {
            if (snd) { snd.currentTime = 0; snd.play().catch(e => {}); }
        }

        function nacitajZoznam() {
            const kontajner = document.getElementById('zoznam-dynamicky');
            const poradia = dataPoradia[srgLog] || ["--"];

            kontajner.innerHTML = "";
            poradia.forEach((cislo, index) => {
                const div = document.createElement('div');
                div.className = "spoj-polozka";
                div.innerText = cislo;
                div.setAttribute('data-kod', cislo);
                div.onclick = function() { vyberPoradie(this, index); };
                kontajner.appendChild(div);
            });
        }

        function vyberPoradie(element, index) {
            playBeep();
            const polozky = document.querySelectorAll('.spoj-polozka');
            polozky.forEach(p => p.classList.remove('selected'));
            
            element.classList.add('selected');
            aktualnyIndex = index;
            
            const cislo = element.getAttribute('data-kod');
            document.getElementById('displej-kod').value = cislo;
            localStorage.setItem('vybrane_poradie', cislo);

            element.scrollIntoView({ block: "nearest", behavior: "smooth" });
        }

        function navigujZoznam(smer) {
            const polozky = document.querySelectorAll('.spoj-polozka');
            let novyIndex = aktualnyIndex + smer;

            if (novyIndex >= 0 && novyIndex < polozky.length) {
                vyberPoradie(polozky[novyIndex], novyIndex);
            }
        }

        function potvrdit() {
            const vybrane = localStorage.getItem('vybrane_poradie');
            if (vybrane) {
                window.onbeforeunload = null;
                playBeep();
                const linka = srgLog.split('.')[1];
                const novyLog = "6." + linka + vybrane;
                localStorage.setItem('srg_log', novyLog);
                setTimeout(() => { window.location.href = "spoj.volba_3.html"; }, 800);
            }
        }

        function istSpat() {
            window.onbeforeunload = null;
            playBeep();
            localStorage.setItem('srg_log', '4');
            setTimeout(() => { window.location.href = "spoj.volba_1.html"; }, 800);
        }

        // Trojklik na vypnutie
        let clickCount = 0;
        let clickTimer;
        function checkTripleClick() {
            playBeep();
            clickCount++;
            if (clickCount === 1) { clickTimer = setTimeout(() => { clickCount = 0; }, 1500); }
            if (clickCount === 3) { 
                window.onbeforeunload = null;
                localStorage.clear();
                window.location.href = "index.html"; 
            }
        }

        function aktualizujHodiny() {
            document.getElementById('hodiny').textContent = new Date().toLocaleTimeString('sk-SK');
        }
        setInterval(aktualizujHodiny, 1000);

        function zvacsiPanel() {
            const frame = document.getElementById('mainFrame');
            const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 650);
            frame.style.transform = `scale(${scale})`;
            frame.style.transformOrigin = 'center center';
        }

        window.onload = () => {
            localStorage.removeItem('vybrane_poradie');
            zvacsiPanel();
            aktualizujHodiny();
            nacitajZoznam();
        };
        window.onresize = zvacsiPanel;
    </script>
</body>
</html>
