<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SRG-6000P - Detail spoja</title>
    <script src="cp.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: Arial, sans-serif; 
            font-weight: bold;
            color: white;
            touch-action: manipulation;
        }

        .monitor-container {
            position: relative;
            width: 1000px; 
            height: 650px; 
            background: url('6000_zmena4.png') no-repeat center center;
            background-size: contain;
            flex-shrink: 0;
        }

        #vyber-info-hore {
            position: absolute;     
            right: 250px; 
            top: 110px;
            font-size: 35px; 
            color: white; 
            z-index: 100;
            white-space: nowrap; 
            display: block;
        }

        #vypis-smer {
            position: absolute; 
            left: 120px; 
            top: 205px;
            width: 268px; 
            height: 60px; 
            z-index: 100;
            display: flex; 
            align-items: center;
            font-size: 32px; 
            white-space: nowrap; 
            color: white;
        }

        #vypis-zastavka {
            position: absolute; 
            left: 120px; 
            top: 340px;
            width: 268px; 
            height: 60px; 
            z-index: 100;
            display: flex; 
            align-items: center;
            font-size: 32px; 
            color: white;
        }

        #pocitadlo-vypis {
            position: absolute;
            left: 130px;
            top: 450px; 
            width: 635px;
            text-align: center;
            font-size: 32px;
            color: white;
        }

        .btn-zone {
            position: absolute;
            cursor: pointer;
            bottom: 90px;
            height: 125px;
            background: transparent;
        }

        #btn-spat { left: 142px; width: 125px; }
        #btn-vzad { left: 270px; width: 190px; }
        #btn-vpred { left: 465px; width: 185px; }
        #btn-ok { left: 655px; width: 125px; }

        #tlacidlo-vypnut { 
            position: absolute; right: 55px; top: 55px; 
            width: 75px; height: 65px; 
            z-index: 1001; cursor: pointer; 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="beepSound" src="6000_beep.wav" preload="auto"></audio>

    <div class="monitor-container" id="mainFrame">
        <div id="tlacidlo-vypnut" onclick="checkTripleClick()"></div>

        <div id="vyber-info-hore">---</div>
        <div id="vypis-smer">---</div>
        <div id="vypis-zastavka">---</div>
        <div id="pocitadlo-vypis">---</div>

        <div id="btn-spat" class="btn-zone" onclick="istNaspät()"></div>
        <div id="btn-vzad" class="btn-zone" onclick="zmenSpoj(-1)"></div>
        <div id="btn-vpred" class="btn-zone" onclick="zmenSpoj(1)"></div>
        <div id="btn-ok" class="btn-zone" onclick="potvrditDoJazdy()"></div>
    </div>

    <script>
    let indexSpoja = 0;
    let vsetkySpoje = [];
    let zvolenySpoj = null;
    const snd = document.getElementById('beepSound');

    const srgLog = localStorage.getItem('srg_log') || "";
    if (!srgLog.startsWith('7.')) {
        localStorage.clear();
        window.location.href = "index.html";
    }

    window.onbeforeunload = function() { return "Zmeny nebudú uložené."; };
    window.addEventListener('keydown', function(e) {
        if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) e.preventDefault();
    });

    function playBeep() {
        if (snd) { snd.currentTime = 0; snd.play().catch(e => {}); }
    }

    function init() {
        const parts = srgLog.split('.');
        if (parts.length < 3) return;

        const kurzRaw = parts[1]; 
        const den = parts[2];     

        // ÚPRAVA: Pridanie úvodzoviek okolo kurzu (napr. "114/2")
        const l = kurzRaw.length;
        const kurzDisplay = '"' + kurzRaw.substring(0, l-1) + "/" + kurzRaw.substring(l-1) + '"';
        
        document.getElementById('vyber-info-hore').innerText = kurzDisplay + " " + den;

        if (typeof databazaCP !== 'undefined' && databazaCP[kurzRaw] && databazaCP[kurzRaw][den]) {
            vsetkySpoje = databazaCP[kurzRaw][den];
            zvolenySpoj = vsetkySpoje[indexSpoja]; 
            aktualizujZobrazenie();
        } else {
            document.getElementById('vypis-smer').innerText = "DATA ERROR";
        }
    }

    function aktualizujZobrazenie() {
        if (!zvolenySpoj) return;

        const prvaZastavka = zvolenySpoj.t[0];
        document.getElementById('vypis-smer').innerText = zvolenySpoj.smer;
        document.getElementById('vypis-zastavka').innerText = prvaZastavka.n;

        const [h_base, m_base] = zvolenySpoj.odchod.split(':').map(Number);
        let celkoveMinuty = h_base * 60 + m_base + prvaZastavka.min;
        let h = Math.floor(celkoveMinuty / 60) % 24;
        let m = celkoveMinuty % 60;
        let casZastavky = String(h).padStart(2, '0') + ":" + String(m).padStart(2, '0');

        let pocetZastavokPreVypis = zvolenySpoj.t.length - 1;

        document.getElementById('pocitadlo-vypis').innerText = 
            `0/${pocetZastavokPreVypis} (${casZastavky})`;
    }

    function zmenSpoj(smer) {
        playBeep();
        let novyIndex = indexSpoja + smer;
        if (novyIndex >= 0 && novyIndex < vsetkySpoje.length) {
            indexSpoja = novyIndex;
            zvolenySpoj = vsetkySpoje[indexSpoja];
            aktualizujZobrazenie();
        }
    }

    function istNaspät() {
        window.onbeforeunload = null;
        playBeep();
        localStorage.setItem('srg_log', '4');
        setTimeout(() => { window.location.href = "spoj.volba_1.html"; }, 300);
    }

    function potvrditDoJazdy() {
        if (zvolenySpoj) {
            window.onbeforeunload = null;
            playBeep();
            
            const now = new Date();
            const [h_spoj, m_spoj] = zvolenySpoj.odchod.split(':').map(Number);
            const casOdchodu = new Date();
            casOdchodu.setHours(h_spoj, m_spoj, 0, 0);

            if (now > casOdchodu) {
                localStorage.setItem('srg_sekundarny_log', '10');
            } else {
                localStorage.setItem('srg_sekundarny_log', '0');
            }

            const dataJazdy = {
                spoj: zvolenySpoj,
                startIndex: 0 
            };
            localStorage.setItem('aktivna_jazda', JSON.stringify(dataJazdy));
            setTimeout(() => { window.location.href = "6000-spoj.html"; }, 1500);
        }
    }

    let clickCount = 0;
    let clickTimer;
    function checkTripleClick() {
        playBeep();
        clickCount++;
        if (clickCount === 1) { clickTimer = setTimeout(() => { clickCount = 0; }, 1500); }
        if (clickCount === 3) { 
            window.onbeforeunload = null;
            localStorage.clear();
            window.location.href = "index.html"; 
        }
    }

    function zvacsiPanel() {
        const frame = document.getElementById('mainFrame');
        const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 650);
        frame.style.transform = `scale(${scale})`;
        frame.style.transformOrigin = 'center center';
    }

    window.onload = () => {
        zvacsiPanel();
        init();
    };
    window.onresize = zvacsiPanel;
    </script>
</body>
</html>
